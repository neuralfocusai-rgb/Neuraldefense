<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Defense | Community Shield</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans pb-10">

    <div class="max-w-md mx-auto p-6 mt-6 bg-slate-800 rounded-xl shadow-2xl border border-slate-700">
        
        <h1 class="text-2xl font-bold text-emerald-400 mb-2">🛡️ Neural Defense</h1>
        <p class="text-sm text-slate-400 mb-6">Decodificador de Engaño Cognitivo</p>

        <div class="mb-4">
            <label class="block text-sm font-medium mb-2">Pegá el mensaje sospechoso aquí:</label>
            <textarea id="textoSospechoso" rows="4" class="w-full p-3 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none text-white" placeholder="Ej: Tu cuenta ha sido bloqueada. Entra a este link URGENTE..."></textarea>
        </div>

        <button onclick="analizarTexto()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200">
            Analizar Amenaza
        </button>

        <div id="resultado" class="mt-6 hidden">
            <h3 class="text-lg font-bold mb-2">Diagnóstico:</h3>
            <div id="nivelAlerta" class="p-3 rounded-lg font-semibold mb-2"></div>
            <ul id="detallesAlerta" class="list-disc pl-5 text-sm space-y-1 text-slate-300 mb-4"></ul>
            
            <button id="btnReportar" onclick="enviarReporte()" class="hidden w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200 shadow-lg shadow-red-500/50">
                🚨 Reportar a la Comunidad
            </button>
        </div>

        <div class="mt-10 border-t border-slate-600 pt-6">
            <div class="flex items-center gap-2 mb-4">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                <h2 class="text-xl font-bold text-slate-100">Radar de Amenazas</h2>
            </div>
            <p class="text-xs text-slate-400 mb-4">Últimos intentos de fraude detectados por la red.</p>
            
            <div id="feedReportes" class="space-y-3">
                <p class="text-slate-500 text-sm text-center py-4">Conectando con la base de datos...</p>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // TUS CREDENCIALES
        const firebaseConfig = {
            apiKey: "AIzaSyBEqDY_baLIgQK_DyAY9PhkYEMH-MZ20cY",
            authDomain: "neural-defense-facac.firebaseapp.com",
            projectId: "neural-defense-facac",
            storageBucket: "neural-defense-facac.firebasestorage.app",
            messagingSenderId: "343870621434",
            appId: "1:343870621434:web:fa2febe076bb006282eb43"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let reporteActual = { texto: "", riesgo: "", banderas: [] };

        window.analizarTexto = function() {
            const texto = document.getElementById('textoSospechoso').value.toLowerCase();
            const resultadoDiv = document.getElementById('resultado');
            const nivelAlerta = document.getElementById('nivelAlerta');
            const detalles = document.getElementById('detallesAlerta');
            const btnReportar = document.getElementById('btnReportar');
            
            detalles.innerHTML = '';
            btnReportar.classList.add('hidden');
            let puntuacionRiesgo = 0;
            let banderasRojas = [];

            if (texto.trim() === '') return alert("Ingresá un texto para analizar.");

            const patrones = {
                urgencia: ["urgente", "inmediato", "bloqueada", "suspendida", "24 horas", "vencerá"],
                gancho: ["ganaste", "premio", "sorteo", "felicidades"],
                accion: ["haz clic", "ingresa aquí", "verifica tu identidad", "actualiza tus datos"],
                financiero: ["banco", "tarjeta", "transferencia", "cvv", "contraseña"]
            };

            patrones.urgencia.forEach(p => { if (texto.includes(p)) { puntuacionRiesgo += 2; banderasRojas.push("Urgencia falsa"); } });
            patrones.gancho.forEach(p => { if (texto.includes(p)) { puntuacionRiesgo += 3; banderasRojas.push("Premio inusual"); } });
            patrones.accion.forEach(p => { if (texto.includes(p)) { puntuacionRiesgo += 2; banderasRojas.push("Exige interacción"); } });
            patrones.financiero.forEach(p => { if (texto.includes(p)) { puntuacionRiesgo += 2; banderasRojas.push("Pide datos sensibles"); } });
            if (texto.includes("http") || texto.includes("www.")) { puntuacionRiesgo += 3; banderasRojas.push("Contiene enlace (Phishing)"); }

            resultadoDiv.classList.remove('hidden');
            
            if (puntuacionRiesgo === 0) {
                nivelAlerta.className = "p-3 rounded-lg font-semibold mb-2 bg-emerald-900 text-emerald-300 border border-emerald-700";
                nivelAlerta.innerText = "✅ Riesgo Bajo";
                reporteActual.riesgo = "Bajo";
            } else {
                nivelAlerta.className = "p-3 rounded-lg font-semibold mb-2 bg-red-900 text-red-300 border border-red-700";
                nivelAlerta.innerText = "🚨 ALTO RIESGO: Patrón de estafa";
                reporteActual.riesgo = "Alto";
                btnReportar.classList.remove('hidden'); 
            }

            banderasRojas = [...new Set(banderasRojas)];
            reporteActual.texto = texto;
            reporteActual.banderas = banderasRojas;

            banderasRojas.forEach(b => {
                const li = document.createElement('li'); li.innerText = b; detalles.appendChild(li);
            });
        }

        window.enviarReporte = async function() {
            const btn = document.getElementById('btnReportar');
            try {
                btn.innerText = "Enviando...";
                btn.disabled = true;

                await addDoc(collection(db, "reportes_comunidad"), {
                    mensaje_original: reporteActual.texto,
                    nivel_riesgo: reporteActual.riesgo,
                    detalles: reporteActual.banderas,
                    fecha: new Date().toISOString()
                });

                btn.innerText = "Reporte Guardado";
                btn.classList.replace('bg-red-600', 'bg-slate-600');
                btn.classList.replace('hover:bg-red-700', 'bg-slate-600');
                btn.classList.remove('shadow-red-500/50');
                
                cargarRadar();

            } catch (e) {
                console.error(e);
                alert("Error al conectar con Firebase.");
                btn.innerText = "🚨 Intentar de nuevo";
                btn.disabled = false;
            }
        }

        window.cargarRadar = async function() {
            const feed = document.getElementById('feedReportes');
            try {
                const q = query(collection(db, "reportes_comunidad"), orderBy("fecha", "desc"), limit(5));
                const querySnapshot = await getDocs(q);
                
                feed.innerHTML = ''; 
                
                if (querySnapshot.empty) {
                    feed.innerHTML = '<p class="text-slate-400 text-sm text-center py-4">No hay amenazas recientes. ¡El sector está seguro!</p>';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const fechaObj = new Date(data.fecha);
                    const horaFormateada = fechaObj.toLocaleTimeString('es-AR', { hour: '2-digit', minute:'2-digit' });
                    
                    const div = document.createElement('div');
                    div.className = "bg-slate-700/50 p-3 rounded-lg border-l-4 " + (data.nivel_riesgo === 'Alto' ? 'border-red-500' : 'border-yellow-500');
                    
                    const etiquetasHTML = data.detalles.map(d => `<span class="inline-block bg-slate-800 text-slate-300 text-[10px] px-2 py-1 rounded mt-1 mr-1">${d}</span>`).join('');

                    div.innerHTML = `
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-xs font-bold ${data.nivel_riesgo === 'Alto' ? 'text-red-400' : 'text-yellow-400'}">Riesgo ${data.nivel_riesgo}</span>
                            <span class="text-xs text-slate-400">${horaFormateada}</span>
                        </div>
                        <p class="text-sm text-slate-200 italic line-clamp-2">"${data.mensaje_original}"</p>
                        <div class="mt-2">
                            ${etiquetasHTML}
                        </div>
                    `;
                    feed.appendChild(div);
                });
            } catch (error) {
                console.error("Error al cargar el radar: ", error);
                if (error.message.includes("index")) {
                     obtenerSinIndice(feed);
                } else {
                     feed.innerHTML = '<p class="text-red-400 text-sm text-center">Error de conexión al cargar el radar.</p>';
                }
            }
        }

        async function obtenerSinIndice(feed) {
             const querySnapshot = await getDocs(collection(db, "reportes_comunidad"));
             let reportes = [];
             querySnapshot.forEach((doc) => reportes.push(doc.data()));
             
             reportes.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
             reportes = reportes.slice(0, 5);
             
             feed.innerHTML = '';
             reportes.forEach((data) => {
                 const horaFormateada = new Date(data.fecha).toLocaleTimeString('es-AR', { hour: '2-digit', minute:'2-digit' });
                 const div = document.createElement('div');
                 div.className = "bg-slate-700/50 p-3 rounded-lg border-l-4 " + (data.nivel_riesgo === 'Alto' ? 'border-red-500' : 'border-yellow-500');
                 const etiquetasHTML = data.detalles.map(d => `<span class="inline-block bg-slate-800 text-slate-300 text-[10px] px-2 py-1 rounded mt-1 mr-1">${d}</span>`).join('');
                 div.innerHTML = `
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-xs font-bold ${data.nivel_riesgo === 'Alto' ? 'text-red-400' : 'text-yellow-400'}">Riesgo ${data.nivel_riesgo}</span>
                            <span class="text-xs text-slate-400">${horaFormateada}</span>
                        </div>
                        <p class="text-sm text-slate-200 italic line-clamp-2">"${data.mensaje_original}"</p>
                        <div class="mt-2">
                            ${etiquetasHTML}
                        </div>
                    `;
                 feed.appendChild(div);
             });
        }

        window.onload = cargarRadar;
    </script>
</body>
</html>
